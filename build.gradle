plugins {
    id 'java'
    id 'idea'
    id 'eclipse'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[7.0.3,8)'
}

def modId = 'respect_socks5_options'
def mixinConfig = "mixins.${modId}.json"

version = '1.0.0'
group = 'com.whatever.respect_socks5_options'
base.archivesName = modId

// Mojang ships Java 21 to end users in 1.20.5+, so your mod should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

minecraft {
    mappings channel: 'official', version: '1.21.1'

    runs {
        configureEach {
            workingDir.convention layout.projectDirectory.dir('run')

            systemProperty 'forge.logging.console.level', 'debug'
            systemProperty 'forge.enabledGameTestNamespaces', modId

            // Mixin requires either specifying the config via command line, or in the jar manifest.
            args "--mixin.config=${mixinConfig}"
        }

        register('client')

        register('server') {
            args '--nogui'
        }

        register('gameTestServer')

        register('data') {
            workingDir = layout.projectDirectory.dir('run-data')

            args '--mod', modId, '--all', '--output', layout.projectDirectory.dir('src/generated/resources'), '--existing', layout.projectDirectory.dir('src/main/resources')
        }
    }
}

repositories {
    minecraft.mavenizer(it)
    maven fg.forgeMaven
    maven fg.minecraftLibsMaven
    mavenCentral()

    exclusiveContent {
        forRepository {
            maven {
                name = 'Sponge'
                url = 'https://repo.spongepowered.org/repository/maven-public'
            }
        }
        filter {
            includeGroupAndSubgroups('org.spongepowered')
        }
    }
}

dependencies {
    implementation minecraft.dependency('net.minecraftforge:forge:1.21.1-52.1.13')
    annotationProcessor 'org.spongepowered:mixin:0.8.7:processor'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.named('jar', Jar) {
    manifest {
        attributes([
            'Specification-Title'  : modId,
            'Specification-Vendor' : 'commandblock2',
            'Specification-Version': '1',
            'Implementation-Title' : project.name,
            'Implementation-Version': project.version,
            'Implementation-Vendor': 'commandblock2',
            'MixinConfigs'         : mixinConfig
        ])
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifact tasks.named('jar')
        }
    }
    repositories {
        maven {
            url = layout.projectDirectory.dir('mcmodsrepo').asFile.toURI()
        }
    }
}
